<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swym Sample Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-accent bg-accent-1" aria-hidden="true"></div>
  <div class="bg-accent bg-accent-2" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 28" aria-hidden="true">
        <path d="M2 20 C 9 6, 16 6, 20 14 C 24 22, 31 22, 38 8" class="mark-a" />
        <path d="M2 14 C 9 24, 16 24, 20 16 C 24 8, 31 8, 38 20" class="mark-b" />
      </svg>
      <span>Swym Sample Store</span>
    </div>
    <div class="session-controls" id="session-controls"></div>
  </header>

  <main class="layout">
    <section class="storefront">
      <h1>Shop</h1>
      <div class="product-grid" id="product-grid"></div>
    </section>

    <aside class="wishlist-panel">
      <div id="share-banner" class="share-banner" hidden>
        <span id="share-banner-text"></span>
        <div class="share-banner-actions">
          <button id="share-merge-btn">Merge into my wishlist</button>
          <button id="share-dismiss-btn" class="secondary">Dismiss</button>
        </div>
      </div>

      <h2>Wishlist <span id="wishlist-count" class="count"></span></h2>
      <p class="active-list-label" id="active-list-label"></p>
      <ul class="wishlist-items" id="wishlist-items"></ul>

      <div class="share-row">
        <button id="share-btn" class="secondary">🔗 Share my wishlist</button>
        <textarea id="share-output" class="share-output" readonly hidden></textarea>
      </div>

      <p id="status-message" class="status-message" role="status"></p>
    </aside>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
